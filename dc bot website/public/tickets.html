<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Ticket System</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="sidebar">

<div class="logo">ExcellentBot</div>

<ul>

<li><a href="/servers">← Back</a></li>

<li>
<a id="overview">Overview</a>
</li>

<li class="active">
<a>Tickets</a>
</li>

</ul>

</div>


<div class="main">

<h1>Create Ticket Panel</h1>

<div class="card ticket-card">

<div class="setting">
<label>Send Panel To Channel</label>
<select id="channel"></select>
</div>


<div class="setting">
<label>Ticket Category</label>
<select id="category"></select>
</div>


<div class="setting">
<label>Panel Title</label>
<input id="title" type="text" placeholder="Support Center">
</div>


<div class="setting">
<label>Description</label>
<textarea id="desc" placeholder="Click the button below to open a support ticket"></textarea>
</div>


<div class="setting">
<label>Support Role</label>
<select id="role"></select>
</div>


<div class="setting">
<label>Button Text</label>
<input id="button" type="text" placeholder="Open Ticket">
</div>


<div class="save-area">
<button onclick="sendPanel()">Send Ticket Panel</button>
</div>

</div>

</div>


<div id="toast">Saved</div>


<script>

const serverId = window.location.pathname.split("/").pop()

document.getElementById("overview").href = `/dashboard/${serverId}`


/* LOAD CHANNELS */

fetch(`/api/channels/${serverId}`)
.then(res=>res.json())
.then(channels=>{

const channelSelect = document.getElementById("channel")
const categorySelect = document.getElementById("category")

channels.forEach(c=>{

const opt = document.createElement("option")
opt.value = c.id
opt.text = c.name

// TEXT CHANNEL
if(c.type === 0){
channelSelect.appendChild(opt)
}

// CATEGORY
if(c.type === 4){
const opt2 = document.createElement("option")
opt2.value = c.id
opt2.text = c.name
categorySelect.appendChild(opt2)
}

})

})


/* LOAD ROLES */

fetch(`/api/roles/${serverId}`)
.then(res=>res.json())
.then(roles=>{

const select = document.getElementById("role")

roles.forEach(r=>{

const opt = document.createElement("option")

opt.value = r.id
opt.text = "@"+r.name

select.appendChild(opt)

})

})


/* SEND PANEL */

function sendPanel(){

const data = {

channel:document.getElementById("channel").value,
category:document.getElementById("category").value,
role:document.getElementById("role").value,
title:document.getElementById("title").value,
description:document.getElementById("desc").value,
button:document.getElementById("button").value

}

if(!data.channel){
showToast("Select a channel")
return
}

if(!data.title){
showToast("Title required")
return
}

if(!data.button){
showToast("Button text required")
return
}

fetch(`/api/tickets/send/${serverId}`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})
.then(res=>res.json())
.then(result=>{

if(result.success){

showToast("Ticket panel sent!")

}else{

showToast("Error sending panel")

}

})

}


/* TOAST */

function showToast(msg){

const toast = document.getElementById("toast")

toast.innerText = msg
toast.style.opacity = "1"

setTimeout(()=>{

toast.style.opacity = "0"

},2500)

}

</script>

</body>

</html>
