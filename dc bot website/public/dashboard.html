<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>ExcellentBot Dashboard</title>

<link rel="stylesheet" href="/css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>

<body>

<div class="sidebar">

<div class="logo">ExcellentBot</div>

<ul>

<li class="active">
<a href="/"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
</li>

<li>
<a href="/modules"><i class="fa-solid fa-cubes"></i> Modules</a>
</li>

<li>
<a href="/commands"><i class="fa-solid fa-terminal"></i> Commands</a>
</li>

<li>
<a href="/stats"><i class="fa-solid fa-chart-simple"></i> Statistics</a>
</li>

<li>
<a href="/logs"><i class="fa-solid fa-scroll"></i> Moderation Log</a>
</li>

<li>
<a href="/settings"><i class="fa-solid fa-gear"></i> Settings</a>
</li>

</ul>

</div>


<div class="main">

<div class="topbar">

<h1>Dashboard</h1>

<div class="topbar-right">

<a href="/login" class="login-btn">
<i class="fa-brands fa-discord"></i>
Login
</a>

<div class="profile">

<img src="https://cdn.discordapp.com/avatars/USERID/AVATAR.png">

<span>Not Logged In</span>

</div>

</div>

</div>


<div class="stats">

<div class="card">
<h3>Servers</h3>
<p>0</p>
</div>

<div class="card">
<h3>Users</h3>
<p>0</p>
</div>

<div class="card">
<h3>Commands Used</h3>
<p>0</p>
</div>

</div>


<div class="activity">

<h2>Activity</h2>

<div class="graph">
<canvas id="activityChart"></canvas>
</div>

</div>


<div class="modules">

<h2>Quick Modules</h2>

<div class="modules-grid">

<div class="module">
<span>Moderation</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="module">
<span>Automod</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="module">
<span>Tickets</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="module">
<span>Invite Logger</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="module">
<span>Welcome</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const ctx = document.getElementById('activityChart');

new Chart(ctx, {

type:'line',

data:{
labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],

datasets:[{
label:'Commands Used',
data:[5,12,8,14,20,18,25],
borderWidth:2,
tension:0.4,
fill:true
}]
},

options:{
responsive:true,
plugins:{legend:{display:false}}
}

})

</script>

</body>
</html>
